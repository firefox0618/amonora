          severity: warning
          scope_key: first_connection_success
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange:
              from: 172800
              to: 0
            model:
              datasource:
                type: postgres
                uid: amonora-analytics
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT COALESCE(SUM(first_connection_success_count)::double precision / 7.0, 0) AS prev_daily
                  FROM analytics_daily_connection
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                ),
                current_window AS (
                  SELECT COALESCE(SUM(first_connection_success_count)::double precision, 0) AS current_total
                  FROM analytics_daily_connection
