        annotations:
          summary: Первые подключения просели сильнее ожидаемого окна
          description: Сигнал о деградации качества активации и онбординга.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality
          panel_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality?viewPanel=1
        labels:
