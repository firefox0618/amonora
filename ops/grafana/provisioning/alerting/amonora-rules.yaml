apiVersion: 1

groups:
  - orgId: 1
    name: Amonora Growth & Revenue
    folder: Amonora Suite
    interval: 5m
    rules:
      - uid: amonora-payment-success-drop
        title: Падение payment_success
        condition: C
        dashboardUid: amonora-home
        panelId: 5
        noDataState: OK
        execErrState: Error
        for: 15m
        annotations:
          summary: Платежи просели сильнее ожидаемого окна
          description: Последние 24 часа по payment_success сильно хуже опорного недельного окна.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-revenue-monetization
          panel_url: https://grafana.amonoraconnect.com/d/amonora-revenue-monetization?viewPanel=1
        labels:
          alert_class: revenue
          severity: critical
          scope_key: payment_success
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange:
              from: 172800
              to: 0
            model:
              datasource:
                type: postgres
                uid: amonora-analytics
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT COALESCE(SUM(events_count)::double precision / 7.0, 0) AS prev_daily
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name = 'payment_success'
                ),
                current_window AS (
                  SELECT COALESCE(SUM(events_count)::double precision, 0) AS current_total
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name = 'payment_success'
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN baseline.prev_daily >= 3
                          AND current_window.current_total < GREATEST(1.0, baseline.prev_daily * 0.4)
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-first-connection-drop
        title: Падение first_connection_success
        condition: C
        dashboardUid: amonora-home
        panelId: 6
        noDataState: OK
        execErrState: Error
