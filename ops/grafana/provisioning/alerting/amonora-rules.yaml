      - uid: amonora-connection-failed-spike
        title: Всплеск connection_failed
        condition: C
        dashboardUid: amonora-connection-quality
        panelId: 1
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: Ошибки первого подключения вышли за нормальный диапазон
          description: Клиенты получают конфиг, но не доходят до успешного first connection.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality
          panel_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality?viewPanel=1
        labels:
          alert_class: ops
          severity: warning
          scope_key: connection_failed
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 172800, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT COALESCE(SUM(connection_failed_count)::double precision / 7.0, 0) AS prev_daily
                  FROM analytics_daily_connection
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                ),
                current_window AS (
                  SELECT COALESCE(SUM(connection_failed_count)::double precision, 0) AS current_total
                  FROM analytics_daily_connection
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN current_window.current_total >= GREATEST(3.0, baseline.prev_daily * 2.0)
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
