  - orgId: 1
    name: Amonora Ops & Reliability
    folder: Amonora Suite
    interval: 5m
    rules:
      - uid: amonora-config-issue-spike
        title: Всплеск config_issue_failed
        condition: C
        dashboardUid: amonora-connection-quality
        panelId: 1
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: Ошибки выдачи конфигов вышли за нормальный диапазон
          description: Quality-сигнал на provisioning / delivery слой.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality
          panel_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality?viewPanel=1
        labels:
          alert_class: ops
          severity: warning
          scope_key: config_issue_failed
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange:
              from: 172800
              to: 0
            model:
              datasource:
                type: postgres
                uid: amonora-analytics
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT COALESCE(SUM(config_issue_failed_count)::double precision / 7.0, 0) AS prev_daily
                  FROM analytics_daily_connection
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                ),
                current_window AS (
                  SELECT COALESCE(SUM(config_issue_failed_count)::double precision, 0) AS current_total
                  FROM analytics_daily_connection
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN current_window.current_total >= GREATEST(3.0, baseline.prev_daily * 2.0)
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
