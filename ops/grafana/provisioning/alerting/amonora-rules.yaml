                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN baseline.prev_daily >= 3
                          AND current_window.current_total < GREATEST(1.0, baseline.prev_daily * 0.4)
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - B
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-bot-config-conversion-drop
        title: Падение bot_start → config conversion
        condition: C
        dashboardUid: amonora-growth-funnel
        panelId: 2
        noDataState: OK
        execErrState: Error
        for: 15m
        annotations:
          summary: Конверсия из bot_start в config заметно просела
          description: Growth-stage сигнал на раннюю часть воронки. Пользователи доходят до бота, но реже получают конфиг.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-growth-funnel
          panel_url: https://grafana.amonoraconnect.com/d/amonora-growth-funnel?viewPanel=2
        labels:
          alert_class: growth
          severity: warning
          scope_key: bot_to_config_conversion
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 172800, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'bot_start' THEN users_count ELSE 0 END), 0)::double precision AS bot_start,
                    COALESCE(SUM(CASE WHEN event_name = 'config_issued' THEN users_count ELSE 0 END), 0)::double precision AS config_issued
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('bot_start', 'config_issued')
                ),
                current_window AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'bot_start' THEN users_count ELSE 0 END), 0)::double precision AS bot_start,
                    COALESCE(SUM(CASE WHEN event_name = 'config_issued' THEN users_count ELSE 0 END), 0)::double precision AS config_issued
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('bot_start', 'config_issued')
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN baseline.bot_start >= 14
                          AND baseline.config_issued / NULLIF(baseline.bot_start, 0) >= 0.20
                          AND current_window.config_issued / NULLIF(current_window.bot_start, 0) < (baseline.config_issued / NULLIF(baseline.bot_start, 0)) * 0.6
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-config-payment-dropoff
        title: Рост drop-off на config → payment
        condition: C
        dashboardUid: amonora-growth-funnel
        panelId: 2
        noDataState: OK
        execErrState: Error
        for: 15m
        annotations:
          summary: Drop-off между config и оплатой вырос выше нормального окна
          description: Пользователи доходят до конфига, но заметно хуже конвертируются в оплату.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-growth-funnel
          panel_url: https://grafana.amonoraconnect.com/d/amonora-growth-funnel?viewPanel=2
        labels:
          alert_class: revenue
          severity: warning
          scope_key: config_to_payment_dropoff
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 172800, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'config_issued' THEN users_count ELSE 0 END), 0)::double precision AS config_issued,
                    COALESCE(SUM(CASE WHEN event_name = 'payment_success' THEN users_count ELSE 0 END), 0)::double precision AS payment_success
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('config_issued', 'payment_success')
                ),
                current_window AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'config_issued' THEN users_count ELSE 0 END), 0)::double precision AS config_issued,
                    COALESCE(SUM(CASE WHEN event_name = 'payment_success' THEN users_count ELSE 0 END), 0)::double precision AS payment_success
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('config_issued', 'payment_success')
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN baseline.config_issued >= 14
                          AND baseline.payment_success / NULLIF(baseline.config_issued, 0) >= 0.15
                          AND current_window.payment_success / NULLIF(current_window.config_issued, 0) < (baseline.payment_success / NULLIF(baseline.config_issued, 0)) * 0.6
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-paid-connected-gap
        title: Рост paid → connected gap
        condition: C
        dashboardUid: amonora-connection-quality
        panelId: 2
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: Разрыв между оплатой и первым подключением вырос
          description: Платёжный funnel доходит до оплаты, но оплаченные пользователи реже доходят до первого подключения.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality
          panel_url: https://grafana.amonoraconnect.com/d/amonora-connection-quality?viewPanel=2
        labels:
          alert_class: ops
          severity: critical
          scope_key: paid_connected_gap
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 172800, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH current_window AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'payment_success' THEN users_count ELSE 0 END), 0)::double precision AS paid_users,
                    COALESCE(SUM(CASE WHEN event_name = 'first_connection_success' THEN users_count ELSE 0 END), 0)::double precision AS connected_users
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('payment_success', 'first_connection_success')
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN current_window.paid_users >= 5
                          AND GREATEST(current_window.paid_users - current_window.connected_users, 0) / NULLIF(current_window.paid_users, 0) >= 0.35
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-payment-funnel-conversion-drop
        title: Падение payment_started → payment_success conversion
        condition: C
        dashboardUid: amonora-revenue-monetization
        panelId: 2
        noDataState: OK
        execErrState: Error
        for: 15m
        annotations:
          summary: Конверсия из payment_started в payment_success просела
          description: Деньги начали теряться между intent/start и подтверждением оплаты.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-revenue-monetization
          panel_url: https://grafana.amonoraconnect.com/d/amonora-revenue-monetization?viewPanel=2
        labels:
          alert_class: revenue
          severity: critical
          scope_key: payment_funnel_conversion
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 172800, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                WITH baseline AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'payment_started' THEN events_count ELSE 0 END), 0)::double precision AS payment_started,
                    COALESCE(SUM(CASE WHEN event_name = 'payment_success' THEN events_count ELSE 0 END), 0)::double precision AS payment_success
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '8 day'
                    AND bucket_date < CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('payment_started', 'payment_success')
                ),
                current_window AS (
                  SELECT
                    COALESCE(SUM(CASE WHEN event_name = 'payment_started' THEN events_count ELSE 0 END), 0)::double precision AS payment_started,
                    COALESCE(SUM(CASE WHEN event_name = 'payment_success' THEN events_count ELSE 0 END), 0)::double precision AS payment_success
                  FROM analytics_daily_stage_counts
                  WHERE bucket_date >= CURRENT_DATE - INTERVAL '1 day'
                    AND source_mode = 'first'
                    AND event_name IN ('payment_started', 'payment_success')
                )
                SELECT NOW() AS "time",
                       CASE
                         WHEN baseline.payment_started >= 10
                          AND baseline.payment_success / NULLIF(baseline.payment_started, 0) >= 0.35
                          AND current_window.payment_success / NULLIF(current_window.payment_started, 0) < (baseline.payment_success / NULLIF(baseline.payment_started, 0)) * 0.6
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM baseline, current_window;
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: B
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
      - uid: amonora-source-key-integrity-degraded
        title: Деградация source_key integrity
        condition: C
        dashboardUid: amonora-alerts-incidents
        panelId: 2
        noDataState: Alerting
        execErrState: Error
        for: 10m
        annotations:
          summary: В acquisition-слое ухудшилось качество source_key
          description: Bot starts приходят с blank/invalid source_key или integrity_ratio ушёл из healthy окна.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-alerts-incidents
          panel_url: https://grafana.amonoraconnect.com/d/amonora-alerts-incidents?viewPanel=2
        labels:
          alert_class: growth
          severity: warning
          scope_key: source_key_integrity
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 3600, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT NOW() AS "time",
                       CASE
                         WHEN status_value <> 'healthy'
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM analytics_runtime_status
                WHERE status_key = 'source_key_integrity';
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [], type: gt}
                  operator: {type: and}
                  query: {params: [B]}
                  reducer: {params: [], type: last}
                  type: query
              datasource: {type: __expr__, uid: __expr__}
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              conditions:
                - evaluator: {params: [0.5], type: gt}
                  operator: {type: and}
                  query: {params: [C]}
                  reducer: {params: [], type: last}
