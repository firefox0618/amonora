        title: Рост repair / incident pressure
        condition: C
        dashboardUid: amonora-ops-repair
        panelId: 1
        noDataState: OK
        execErrState: Error
        for: 10m
        annotations:
          summary: Repair-needed или failure buckets требуют внимания
          description: Открытые repair-needed или reconcile/provisioning pressure вышли из безопасного окна.
          dashboard_url: https://grafana.amonoraconnect.com/d/amonora-ops-repair
          panel_url: https://grafana.amonoraconnect.com/d/amonora-ops-repair?viewPanel=5
        labels:
          alert_class: ops
          severity: critical
          scope_key: repair_pressure
        data:
          - refId: A
            datasourceUid: amonora-analytics
            relativeTimeRange: {from: 21600, to: 0}
            model:
              datasource: {type: postgres, uid: amonora-analytics}
              editorMode: code
              format: time_series
              intervalMs: 1000
              maxDataPoints: 43200
              rawQuery: true
              rawSql: |
                SELECT NOW() AS "time",
                       CASE
                         WHEN COALESCE(repair_needed_open_count, 0) >= 3
                           OR COALESCE(reconcile_failure_events_24h, 0) >= 5
                           OR COALESCE(provisioning_failure_events_24h, 0) >= 5
                         THEN 1.0
                         ELSE 0.0
                       END AS value
                FROM analytics_hourly_ops_snapshots
                ORDER BY bucket_hour DESC
                LIMIT 1;
