[server]
protocol = http
http_addr = 127.0.0.1
http_port = 3002
domain = grafana.amonoraconnect.com
root_url = https://grafana.amonoraconnect.com/
serve_from_sub_path = false

[security]
admin_user = $__env{GF_SECURITY_ADMIN_USER}
admin_password = $__env{GF_SECURITY_ADMIN_PASSWORD}
cookie_secure = true
allow_embedding = false
strict_transport_security = true

[auth.anonymous]
enabled = false

[dashboards]
default_home_dashboard_path = /opt/amonora_bot/ops/grafana/dashboards/amonora-home.json

[users]
default_theme = dark

[paths]
provisioning = /opt/amonora_bot/ops/grafana/provisioning
