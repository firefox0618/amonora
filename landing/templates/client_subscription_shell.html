<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }}</title>
    <meta name="description" content="{{ page_description }}">
    <link rel="canonical" href="{{ canonical_url }}">
    <meta name="theme-color" content="#100913">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page_title }}">
    <meta property="og:description" content="{{ page_description }}">
    <meta property="og:url" content="{{ canonical_url }}">
    <meta property="og:site_name" content="Amonora">
    <meta property="og:image" content="{{ canonical_url }}/static/og-image.png">
    <meta property="og:locale" content="ru_RU">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page_title }}">
    <meta name="twitter:description" content="{{ page_description }}">
    <meta name="twitter:image" content="{{ canonical_url }}/static/og-image.png">

    <link rel="icon" href="/static/favicon.svg?v={{ asset_version }}">
    <link rel="stylesheet" href="/client-static/assets/app.css?v={{ asset_version }}">
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__AMONORA_CLIENT_TOKEN__ = {{ client_token | tojson }};
      window.__AMONORA_CLIENT_API_BASE__ = "";
    </script>
    <script type="module" src="/client-static/assets/app.js?v={{ asset_version }}"></script>
  </body>
</html>
